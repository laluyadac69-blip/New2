<!DOCTYPE html>
<html lang="en">
<head>

  <title>Dancing Animations - 10 Loops</title>
  <style>
    :root {
      --bg: #0f0015;
      --card: #1a0f2e;
      --glow: #ff2e8e;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 2.8rem;
      background: linear-gradient(90deg, #ff2e8e, #ff6b9d, #ff4081);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      aspect-ratio: 3 / 4;
      position: relative;
      background: var(--card);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7),
                  0 0 20px rgba(255,46,142,0.2);
      transition: all 0.4s ease;
    }

    .card:hover {
      transform: scale(1.08) translateY(-10px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.8),
                  0 0 30px rgba(255,46,142,0.4);
    }

    .anim {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .title {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 1.1rem;
      color: #fff;
      text-shadow: 0 2px 6px #000;
      pointer-events: none;
    }
  </style>
</head>
