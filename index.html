<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Girls - Simple Version</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      position: relative;
      width: 620px;
      height: 480px;
    }

    svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Girl 1 - left side (boobs shaking more) */
    #girl1 {
      animation: sway-girl1 6s infinite ease-in-out;
    }

    @keyframes sway-girl1 {
      0%,100% { transform: translateX(0) rotate(-4deg); }
      50%     { transform: translateX(12px) rotate(6deg); }
    }

    /* Girl 2 - right side (hips moving more) */
    #girl2 {
      animation: sway-girl2 7.2s infinite ease-in-out;
    }

    @keyframes sway-girl2 {
      0%,100% { transform: translateX(0) rotate(3deg); }
      50%     { transform: translateX(-18px) rotate(-7deg); }
    }

    /* Breast bounce - girl1 */
    #breast-left, #breast-right {
      animation: bounce-breast 1.8s infinite ease-in-out;
      transform-origin: 50% 30%;
    }

    @keyframes bounce-breast {
      0%,100% { transform: scaleY(1) translateY(0); }
      40%     { transform: scaleY(1.18) translateY(-6px); }
      70%     { transform: scaleY(0.92) translateY(4px); }
    }

    /* Hips / ass bounce - girl2 */
    #hips-girl2 {
      animation: bounce-hips 2.4s infinite ease-in-out;
      transform-origin: 50% 70%;
    }

    @keyframes bounce-hips {
      0%,100%   { transform: scale(1) translateY(0) rotate(0deg); }
      45%       { transform: scale(1.06) translateY(-5px) rotate(2deg); }
      75%       { transform: scale(0.97) translateY(6px) rotate(-3deg); }
    }

    /* Skin tones - realistic-ish */
    .skin-a { fill: #f9c9b5; }   /* light warm */
    .skin-b { fill: #e8b89e; }   /* medium */
    .skin-c { fill: #d9a78c; }   /* slightly tanned */
    .nipple   { fill: #c56b5c; }
    .shadow   { fill: rgba(0,0,0,0.18); }
  </style>
</head>
<body>

<div class="scene">

  <!-- Girl 1 - Left (boobs focus) -->
  <svg id="girl1" viewBox="0 0 300 480">
    <!-- head -->
    <ellipse cx="150" cy="90" rx="50" ry="60" class="skin-b"/>
    <!-- neck -->
    <rect x="135" y="130" width="30" height="40" class="skin-b"/>
    <!-- torso -->
    <ellipse cx="150" cy="220" rx="75" ry="110" class="skin-a"/>
    <!-- breasts -->
    <ellipse id="breast-left"  cx="120" cy="190" rx="38" ry="48" class="skin-a"/>
    <ellipse id="breast-right" cx="180" cy="190" rx="38" ry="48" class="skin-a"/>
    <!-- nipples -->
    <circle cx="118" cy="195" r="9" class="nipple"/>
    <circle cx="182" cy="195" r="9" class="nipple"/>
    <!-- shadow between boobs -->
    <ellipse cx="150" cy="195" rx="18" ry="32" class="shadow"/>
    <!-- hips -->
    <ellipse cx="150" cy="340" rx="90" ry="60" class="skin-c"/>
  </svg>

  <!-- Girl 2 - Right (ass/hips focus) -->
  <svg id="girl2" viewBox="0 0 300 480" x="320">
    <!-- head -->
    <ellipse cx="150" cy="90" rx="50" ry="60" class="skin-b"/>
    <!-- neck -->
    <rect x="135" y="130" width="30" height="40" class="skin-b"/>
    <!-- torso -->
    <ellipse cx="150" cy="220" rx="70" ry="100" class="skin-a"/>
    <!-- small breasts -->
    <ellipse cx="125" cy="205" rx="28" ry="36" class="skin-a"/>
    <ellipse cx="175" cy="205" rx="28" ry="36" class="skin-a"/>
    <!-- hips / ass - main movement here -->
    <g id="hips-girl2">
      <ellipse cx="150" cy="340" rx="105" ry="75" class="skin-c"/>
      <ellipse cx="135" cy="355" rx="60" ry="45" class="skin-a" transform="rotate(-15 135 355)"/>
      <ellipse cx="165" cy="355" rx="60" ry="45" class="skin-a" transform="rotate(15 165 355)"/>
    </g>
    <!-- simple hair (just to differentiate) -->
    <path d="M100 40 Q150 0 200 40 Q180 100 150 80 Q120 100 100 40" fill="#8B5A2B"/>
  </svg>

</div>

</body>
</html>
